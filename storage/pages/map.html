<div id="map-container">
    <div id="map-control-panel">
        <h2 class="panel-title">Gestion des Couches</h2>
        <div class="panel-sep"></div>
        
        <div class="layer-section">
            <h3>Fichiers Vecteurs (SHP)</h3>
            <label class="layer-item">
                <input type="checkbox" id="layer-shp-1" checked>
                <span class="custom-checkbox"></span>
                Limites parcellaires
            </label>
            <label class="layer-item">
                <input type="checkbox" id="layer-shp-2">
                <span class="custom-checkbox"></span>
                Réseau hydrographique
            </label>
        </div>

        <div class="layer-section">
            <h3>Fichiers Rasters</h3>
            <label class="layer-item">
                <input type="checkbox" id="layer-raster-1" checked>
                <span class="custom-checkbox"></span>
                Indice NDVI (Capteur)
            </label>
            <label class="layer-item">
                <input type="checkbox" id="layer-raster-2">
                <span class="custom-checkbox"></span>
                Modèle Numérique de Terrain
            </label>
        </div>
    </div>
    <div id="osm-map"></div>
</div>
